version: "3.8"

services:
  web:
    image: ${IMAGE}

    hostname: "inventario-gtn-{{.Node.Hostname}}"

    command: >
      gunicorn setup.wsgi:application
      --bind 0.0.0.0:${APP_PORT}
      --workers 4
      --threads 2
      --timeout 60
      --max-requests 1000
      --max-requests-jitter 100

    ports:
      - target: ${APP_PORT}
        published: ${APP_PORT}
        protocol: tcp
        mode: host

    networks:
      - app_network

    environment:
      APP_PORT: ${APP_PORT}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      INVENTARIO_API_BASE_URL: ${INVENTARIO_API_BASE_URL}
      TYPE_NAME: ${TYPE_NAME}
      ENABLE_TEST_ROUTES: ${ENABLE_TEST_ROUTES}
      OTEL_ENABLED: ${OTEL_ENABLED}
      OTEL_APPEND_IP_SUFFIX: ${OTEL_APPEND_IP_SUFFIX}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      LOKI_URL: ${LOKI_URL}
      LOG_LEVEL: ${LOG_LEVEL}

    deploy:
      mode: replicated
      replicas: 3

      placement:
        max_replicas_per_node: 1

      restart_policy:
        condition: on-failure
        delay: 5s

      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback

      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first

      resources:
        reservations:
          cpus: "0.50"
          memory: 512M
        limits:
          cpus: "2.00"
          memory: 2048M

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:$${APP_PORT}/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app_network:
    external: true
