name: Build and Deploy Inventario GTN to Docker Swarm

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  STACK_NAME: inventario_gtn
  STACK_FILE: deploy/stack.yml
  ENV_FILE: /opt/envs/inventario-gtn.env

jobs:
  deploy:
    runs-on: [self-hosted, linux, swarm]

    permissions:
      contents: read
      packages: write

    concurrency:
      group: deploy-main
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Define image name
        run: |
          IMAGE_NAME=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/${IMAGE_NAME}:${GITHUB_SHA}" >> $GITHUB_ENV
          echo "IMAGE_LATEST=ghcr.io/${IMAGE_NAME}:latest" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ env.IMAGE_LATEST }}

      - name: Validate Swarm cluster
        run: |
          docker node ls
          docker network ls | grep app_network

      - name: Run database migrations
        run: |
          docker run --rm \
            --env-file "${ENV_FILE}" \
            "${IMAGE}" \
            python manage.py migrate --noinput

      - name: Validate and fix environment file
        run: |
          if [[ ! -f "${ENV_FILE}" ]]; then
            echo "Arquivo de ambiente ausente: ${ENV_FILE}" >&2
            exit 1
          fi

          # Corrige typo ALLOWED_HOSTS=ALLOWED_HOSTS=... (healthcheck Docker falha com DisallowedHost)
          if grep -qE '^ALLOWED_HOSTS=ALLOWED_HOSTS=' "${ENV_FILE}"; then
            sed -i 's/^ALLOWED_HOSTS=ALLOWED_HOSTS=/ALLOWED_HOSTS=/' "${ENV_FILE}"
            echo "Corrigido prefixo duplicado em ALLOWED_HOSTS"
          fi

          set -a
          # shellcheck disable=SC1090
          source "${ENV_FILE}"
          set +a

          : "${APP_PORT:?APP_PORT ausente no ENV_FILE}"

          if [[ -z "${ALLOWED_HOSTS:-}" ]]; then
            echo "ALLOWED_HOSTS ausente no ENV_FILE" >&2
            exit 1
          fi

          echo "APP_PORT=${APP_PORT}"
          echo "ALLOWED_HOSTS=${ALLOWED_HOSTS}"

      - name: Deploy stack
        run: |
          set -a
          source "${ENV_FILE}"
          set +a
          export IMAGE="${IMAGE}"

          docker stack deploy \
            --with-registry-auth \
            -c "${STACK_FILE}" \
            "${STACK_NAME}"

      - name: Wait for replicas
        run: |
          set -a
          source "${ENV_FILE}"
          set +a

          SERVICE="${STACK_NAME}_web"
          DESIRED=3
          TIMEOUT=300
          ELAPSED=0

          echo "Aguardando ${DESIRED}/${DESIRED} réplicas running em ${SERVICE} (timeout ${TIMEOUT}s)..."

          while [[ "${ELAPSED}" -lt "${TIMEOUT}" ]]; do
            RUNNING=$(docker service ls --filter "name=${SERVICE}" --format '{{.Replicas}}' | head -1)
            echo "  ${ELAPSED}s — réplicas: ${RUNNING:-desconhecido}"

            if [[ "${RUNNING}" == "${DESIRED}/${DESIRED}" ]]; then
              echo "Serviço estável: ${RUNNING}"
              docker stack services "${STACK_NAME}"
              docker stack ps "${STACK_NAME}" --no-trunc
              exit 0
            fi

            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done

          echo "Timeout: serviço não atingiu ${DESIRED}/${DESIRED} réplicas running." >&2
          docker service ps "${SERVICE}" --no-trunc
          docker service logs "${SERVICE}" --tail 100 2>&1 || true
          exit 1
