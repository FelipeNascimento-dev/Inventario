name: Build and Deploy Inventario GTN to Docker Swarm

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  STACK_NAME: inventario_gtn
  STACK_FILE: deploy/stack.yml
  ENV_FILE: /opt/envs/inventario-gtn.env

jobs:
  deploy:
    runs-on: [self-hosted, linux, swarm]

    permissions:
      contents: read
      packages: write

    concurrency:
      group: deploy-main
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Define image name
        run: |
          IMAGE_NAME=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/${IMAGE_NAME}:${GITHUB_SHA}" >> $GITHUB_ENV
          echo "IMAGE_LATEST=ghcr.io/${IMAGE_NAME}:latest" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            CACHE_BUST=${{ github.sha }}
          tags: |
            ${{ env.IMAGE }}
            ${{ env.IMAGE_LATEST }}

      - name: Pull image on runner
        run: |
          echo "Garantindo imagem no registry e cache local do manager antes do deploy..."
          docker pull "${IMAGE}"
          docker pull "${IMAGE_LATEST}"

      - name: Verify image tag and template layer
        run: |
          echo "Imagem do deploy: ${IMAGE}"
          docker image inspect "${IMAGE}" --format 'Id={{.Id}} Created={{.Created}}'
          docker run --rm "${IMAGE}" \
            python -c "from pathlib import Path; p=Path('/app/inventario/templates/inventario/index.html'); print('index.html', p.stat().st_size, 'bytes'); print(p.read_text(encoding='utf-8')[:200])"

      - name: Validate Swarm cluster
        run: |
          docker node ls
          docker network ls | grep app_network

      - name: Run database migrations
        run: |
          docker run --rm \
            --env-file "${ENV_FILE}" \
            "${IMAGE}" \
            python manage.py migrate --noinput

      - name: Validate and fix environment file
        run: |
          if [[ ! -f "${ENV_FILE}" ]]; then
            echo "Arquivo de ambiente ausente: ${ENV_FILE}" >&2
            exit 1
          fi

          # Corrige typo ALLOWED_HOSTS=ALLOWED_HOSTS=... (healthcheck Docker falha com DisallowedHost)
          if grep -qE '^ALLOWED_HOSTS=ALLOWED_HOSTS=' "${ENV_FILE}"; then
            sed -i 's/^ALLOWED_HOSTS=ALLOWED_HOSTS=/ALLOWED_HOSTS=/' "${ENV_FILE}"
            echo "Corrigido prefixo duplicado em ALLOWED_HOSTS"
          fi

          set -a
          # shellcheck disable=SC1090
          source "${ENV_FILE}"
          set +a

          : "${APP_PORT:?APP_PORT ausente no ENV_FILE}"

          if [[ -z "${ALLOWED_HOSTS:-}" ]]; then
            echo "ALLOWED_HOSTS ausente no ENV_FILE" >&2
            exit 1
          fi

          echo "APP_PORT=${APP_PORT}"
          echo "ALLOWED_HOSTS=${ALLOWED_HOSTS}"

      - name: Deploy stack
        run: |
          set -a
          source "${ENV_FILE}"
          set +a
          export IMAGE="${IMAGE}"

          # Re-pull antes do stack deploy: credenciais do login GHCR ainda ativas no job.
          docker pull "${IMAGE}"

          docker stack deploy \
            --with-registry-auth \
            -c "${STACK_FILE}" \
            "${STACK_NAME}"

          docker stack deploy \
            --with-registry-auth \
            -c "${STACK_FILE}" \
            "${STACK_NAME}"

          echo "Imagem declarada no serviço:"
          docker service inspect "${STACK_NAME}_web" --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}'

      - name: Wait for replicas
        run: |
          set -a
          source "${ENV_FILE}"
          set +a

          SERVICE="${STACK_NAME}_web"
          DESIRED=3
          TIMEOUT=600
          INTERVAL=15
          STABLE_REQUIRED=2
          ELAPSED=0
          STABLE_CHECKS=0
          IMAGE_TAG="${IMAGE##*:}"

          count_running_tasks() {
            docker service ps "${SERVICE}" \
              --filter "desired-state=running" \
              --format '{{.CurrentState}}' 2>/dev/null \
              | awk '$1 == "Running" { count++ } END { print count + 0 }'
          }

          count_running_expected_image() {
            docker service ps "${SERVICE}" \
              --filter "desired-state=running" \
              --format '{{.Image}}' 2>/dev/null \
              | awk -v tag="${IMAGE_TAG}" '$0 ~ tag { count++ } END { print count + 0 }'
          }

          list_running_images() {
            docker service ps "${SERVICE}" \
              --filter "desired-state=running" \
              --format '{{.Node}} {{.Image}}' 2>/dev/null \
              | sort -u
          }

          get_replicas_line() {
            docker service ls --format '{{.Name}} {{.Replicas}}' \
              | awk -v svc="${SERVICE}" '$1 == svc { print $2; exit }'
          }

          echo "Aguardando ${DESIRED}/${DESIRED} réplicas na imagem ${IMAGE} (timeout ${TIMEOUT}s)..."

          while [[ "${ELAPSED}" -lt "${TIMEOUT}" ]]; do
            REPLICAS_LINE="$(get_replicas_line)"
            RUNNING_COUNT="$(count_running_tasks)"
            MATCHING_IMAGE="$(count_running_expected_image)"
            echo "  ${ELAPSED}s — Running: ${RUNNING_COUNT}/${DESIRED} | tag ${IMAGE_TAG}: ${MATCHING_IMAGE}/${DESIRED} | service ls: ${REPLICAS_LINE:-ausente}"

            if [[ "${MATCHING_IMAGE}" -ne "${DESIRED}" ]] && [[ "${RUNNING_COUNT}" -eq "${DESIRED}" ]]; then
              echo "  Réplicas em versões diferentes:"
              list_running_images | sed 's/^/    /'
            fi

            if [[ "${RUNNING_COUNT}" -eq "${DESIRED}" ]] \
              && [[ "${MATCHING_IMAGE}" -eq "${DESIRED}" ]] \
              && [[ "${REPLICAS_LINE}" =~ ^${DESIRED}/${DESIRED} ]]; then
              STABLE_CHECKS=$((STABLE_CHECKS + 1))
              if [[ "${STABLE_CHECKS}" -ge "${STABLE_REQUIRED}" ]]; then
                echo "Serviço estável na imagem ${IMAGE}"
                list_running_images
                docker stack services "${STACK_NAME}"
                docker stack ps "${STACK_NAME}" --no-trunc
                exit 0
              fi
            else
              STABLE_CHECKS=0
            fi

            sleep "${INTERVAL}"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "Timeout: nem todas as réplicas estão Running na imagem ${IMAGE}" >&2
          echo "Imagens em execução:" >&2
          list_running_images >&2
          docker stack services "${STACK_NAME}" || true
          docker service ps "${SERVICE}" --no-trunc
          docker service logs "${SERVICE}" --tail 100 2>&1 || true
          exit 1
