name: Build and Deploy Inventario GTN to Docker Swarm

on:
  push:
    branches:
      - main

env:
  STACK_NAME: inventario_gtn
  STACK_FILE: deploy/stack.yml
  ENV_FILE: /opt/envs/inventario-gtn.env

jobs:
  deploy:
    runs-on: [self-hosted, linux, swarm]

    permissions:
      contents: read
      packages: write

    concurrency:
      group: deploy-main
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Define image name
        run: |
          IMAGE_NAME=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/${IMAGE_NAME}:${GITHUB_SHA}" >> $GITHUB_ENV
          echo "IMAGE_LATEST=ghcr.io/${IMAGE_NAME}:latest" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ env.IMAGE_LATEST }}

      - name: Validate Swarm cluster
        run: |
          docker node ls
          docker network ls | grep app_network

      - name: Run database migrations
        run: |
          docker run --rm \
            --env-file "${ENV_FILE}" \
            "${IMAGE}" \
            python manage.py migrate --noinput

      - name: Deploy stack
        run: |
          set -a
          source "${ENV_FILE}"
          set +a
          export IMAGE="${IMAGE}"

          docker stack deploy \
            --with-registry-auth \
            -c "${STACK_FILE}" \
            "${STACK_NAME}"

      - name: Check services
        run: |
          docker stack services "${STACK_NAME}"
          docker stack ps "${STACK_NAME}" --no-trunc
