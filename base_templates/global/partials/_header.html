{% load static %}

<div class="navbar">

    <a href="{% url 'inventario:index' %}">
        <img class="nav-logo" src="{% static 'global/images/logo_flow.png' %}" alt="Logo">
    </a>

    <div class="nav-links">
        <a href="{% url 'inventario:index' %}">Home</a>

        {% if pode_ver_dashboard %}
        <div class="dropdown nav-dashboard-dropdown">
            <button type="button" class="dropbtn{% if dash_secao %} hover-active{% endif %}" aria-haspopup="true" aria-expanded="false">
                Dashboard <i class="fa-solid fa-chevron-down nav-chevron" aria-hidden="true"></i>
            </button>
            <div class="dropdown-content nav-dashboard-menu">
                <a href="{% url 'inventario:acompanhamento' %}"
                   class="nav-dashboard-item{% if dash_secao == 'lotes' %} active{% endif %}">
                    <i class="fa-solid fa-chart-line" aria-hidden="true"></i>
                    Acompanhamento de Lotes
                </a>
                <a href="{% url 'inventario:acompanhamento_locais' %}"
                   class="nav-dashboard-item{% if dash_secao == 'locais' %} active{% endif %}">
                    <i class="fa-solid fa-location-dot" aria-hidden="true"></i>
                    Status dos Locais
                </a>
            </div>
        </div>
        <div class="dropdown">
            <a class="dropbtn" href="{% url 'inventario:relatorios' %}">Relatórios</a>
        </div>
        {% endif %}

        <div class="usuario-dropdown">
            <button class="usuario-logado" onclick="toggleUsuarioMenu()">
                Olá, {{ request.user.first_name|default:request.user.username }} ▾
            </button>
            <div id="usuario-menu" class="usuario-dropdown-menu">
                <a href="{% url 'inventario:logout_confirm' %}">Sair</a>
            </div>
        </div>
    </div>
</div>

<script src="{% static 'global/javascript/script.js' %}"></script>
